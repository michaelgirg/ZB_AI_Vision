name: Portable Checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-and-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check Python syntax
        run: python -m compileall -q scripts pytorch
      - name: Check generated artifacts, register map, and text hygiene
        run: python scripts/check_repo_consistency.py
      - name: Validate vector predictor
        run: python scripts/validate_vector_predictor.py

  rtl-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install --yes verilator
      - name: Lint vector AXI4-Stream IP
        run: verilator --lint-only --sv --timing --Wall --Wno-fatal --top-module axis_preprocess_vector_axi_lite -f scripts/rtl_filelist.f
      - name: Lint dual-clock wrapper
        run: verilator --lint-only --sv --timing --Wall --Wno-fatal --top-module axis_preprocess_vector_cdc -f scripts/rtl_filelist.f
